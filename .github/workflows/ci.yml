name: Test on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.changes.outputs.features }}

    steps:
      - uses: actions/checkout@v4

      - id: changes
        run: |
          # Get changed features (exclude deleted)
          changed_features=$(git diff --name-only \
            --diff-filter=d \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} | \
            grep '^src/' | \
            cut -d'/' -f2 | \
            sort -u | \
            jq -R -s -c 'split("\n")[:-1]')

          # Fail if empty
          if [ "$(echo "$changed_features" | jq length)" -eq 0 ]; then
            echo "No features detected in changes. Failing CI."
            exit 1
          fi

          echo "features=$changed_features" >> "$GITHUB_OUTPUT"

  discover:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.set-matrix.outputs.tests }}

    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          files=$(find src -name "test.sh" -type f | jq -R -s -c '
            split("\n")[:-1]
            | map({
                path: .,
                name: (split("/")[1]),
                script: ("bash \"" + . + "\"")
              })
            | map(select(.name as $n | ${{ needs.detect-changes.outputs.features }} | index($n)))
          ')
          echo "tests=$files" >> "$GITHUB_OUTPUT"

  test:
    needs: discover
    runs-on: ubuntu-latest
    name: test ${{ matrix.test.name }}
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover.outputs.tests) }}

    steps:
      - uses: actions/checkout@v4
      - name: Run feature test in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: ${{ matrix.test.script }}
