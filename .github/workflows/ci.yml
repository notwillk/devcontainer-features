name: Test on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.changes.outputs.run_all }}
      features: ${{ steps.changes.outputs.features }}

    steps:
      - uses: actions/checkout@v4

      - id: changes
        run: |
          if git diff --name-only \
               --diff-filter=d \
               ${{ github.event.pull_request.base.sha }} \
               ${{ github.event.pull_request.head.sha }} | \
               grep -q '^\.github/workflows/test-features\.yml$'; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
            echo "features=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_all=false" >> "$GITHUB_OUTPUT"

          changed_features=$(git diff --name-only \
            --diff-filter=d \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} | \
            grep '^src/' | \
            cut -d'/' -f2 | \
            sort -u | \
            jq -R -s -c 'split("\n")[:-1]')

          echo "features=$changed_features" >> "$GITHUB_OUTPUT"

  test-features:
    needs: detect-changes
    uses: ./.github/workflows/test-features.yml
    with:
      run_all: ${{ needs.detect-changes.outputs.run_all == 'true' }}
      features: ${{ needs.detect-changes.outputs.features }}