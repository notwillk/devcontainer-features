name: Test on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.changes.outputs.run_all }}
      features: ${{ steps.changes.outputs.features }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^\.github/workflows/test-features\.yml$'; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
            echo "features=[]" >> "$GITHUB_OUTPUT"
            echo "Workflow file changed - running all tests"
            exit 0
          fi

          echo "run_all=false" >> "$GITHUB_OUTPUT"

          changed_features=$(git diff --name-only origin/main...HEAD | \
            grep '^src/' | \
            cut -d'/' -f2 | \
            sort -u | \
            while read -r feature; do
              if [ -d "src/$feature" ]; then
                echo "$feature"
              fi
            done | \
            jq -R -s -c 'split("\n")[:-1]')

          echo "features=$changed_features" >> "$GITHUB_OUTPUT"
          echo "Changed features: $changed_features"

  test-features:
    needs: detect-changes
    uses: ./.github/workflows/test-features.yml
    with:
      run_all: ${{ needs.detect-changes.outputs.run_all == 'true' }}
      features: ${{ needs.detect-changes.outputs.features }}