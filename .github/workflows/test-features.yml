name: Test Features

on:
  workflow_call:
    inputs:
      run_all:
        type: boolean
        default: true
      features:
        type: string
        default: "[]"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.set-matrix.outputs.tests }}

    steps:
      - uses: actions/checkout@v4

      - id: set-matrix
        run: |
          if [ "${{ inputs.run_all }}" = "true" ] || [ "$(echo '${{ inputs.features }}' | jq length)" -eq 0 ]; then
            files=$(ls -1 src/*/test.sh 2>/dev/null | jq -R -s -c '
              split("\n")[:-1]
              | map({
                  path: .,
                  name: (split("/")[1]),
                  script: ("bash \"" + . + "\"")
                })
            ')
            echo "tests=$files" >> "$GITHUB_OUTPUT"
            echo "Running all tests"
          else
            files=$(ls -1 src/*/test.sh 2>/dev/null | jq -R -s -c '
              split("\n")[:-1]
              | map({
                  path: .,
                  name: (split("/")[1]),
                  script: ("bash \"" + . + "\"")
                })
              | map(select(.name as $n | ${{ inputs.features }} | index($n)))
            ')
            echo "tests=$files" >> "$GITHUB_OUTPUT"
            echo "Running filtered tests: ${{ inputs.features }}"
          fi

  test:
    needs: discover
    runs-on: ubuntu-latest

    name: test ${{ matrix.test.name }}

    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJson(needs.discover.outputs.tests) }}

    steps:
      - uses: actions/checkout@v4

      - name: Run feature test in devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: ${{ matrix.test.script }}